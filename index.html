<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Cosmic Intelligence - Fix Click Interface</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --space-black: #020617;
            --panel-glass: rgba(15, 23, 42, 0.95);
        }

        body {
            margin: 0; background: var(--space-black); color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; height: 100vh; overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 380px; background: var(--panel-glass);
            border-right: 2px solid var(--neon-blue);
            padding: 40px; z-index: 1000; /* Pastikan di atas segalanya */
            backdrop-filter: blur(20px);
            box-shadow: 20px 0 50px rgba(0,0,0,0.9);
            overflow-y: auto;
            transition: all 0.5s ease;
        }

        .planet-name { font-size: 2.8rem; font-weight: 900; color: var(--neon-blue); margin: 0; text-transform: uppercase; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 25px 0; }
        .data-card { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; border-left: 3px solid var(--neon-blue); }
        .label { font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; }
        .value { font-size: 1rem; font-weight: 600; color: white; }

        /* Viewport */
        .viewport { 
            flex-grow: 1; position: relative; 
            display: flex; justify-content: center; align-items: center; 
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
        }

        /* Matahari */
        .sun-obj {
            width: 80px; height: 80px; 
            background: radial-gradient(circle, #fffa86, #f97316);
            border-radius: 50%; box-shadow: 0 0 60px #f97316; 
            cursor: pointer; z-index: 500;
            position: relative;
        }

        /* Orbit - Sekarang TRANSPARENT Klik (Pointer Events None) */
        .orbit {
            position: absolute; border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 50%; 
            animation: rotate linear infinite;
            pointer-events: none; /* AGAR TIDAK MENGHALANGI KLIK */
        }

        /* Planet - Sekarang BISA DIKLIK (Pointer Events Auto) */
        .planet-clickable {
            position: absolute; 
            top: 50%; left: 0;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            cursor: pointer;
            pointer-events: auto; /* MENGAKTIFKAN KLIK KEMBALI */
            transition: transform 0.3s, box-shadow 0.3s;
            z-index: 600;
        }

        .planet-clickable:hover {
            transform: translate(-50%, -50%) scale(1.5);
            box-shadow: 0 0 20px white;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .star { position: absolute; background: white; border-radius: 50%; z-index: 1; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div id="display">
            <h1 class="planet-name">SOLARIS</h1>
            <p style="color: var(--neon-blue)">Pusat Komando Astronomi</p>
            <hr border="1" style="border-color: rgba(0,242,255,0.2)">
            <p id="description" style="line-height: 1.6;">Selamat datang, Komandan. Klik pada objek angkasa di layar kanan untuk memulai pemindaian data mendalam tiap planet.</p>
        </div>
    </aside>

    <main class="viewport" id="space">
        <div class="sun-obj" onclick="loadPlanet('sun')"></div>
    </main>

    <script>
        const db = {
            sun: { name: "Matahari", type: "Bintang (G2V)", temp: "5,505°C", grav: "274 m/s²", mass: "333,000 Bumi", age: "4.6 Miliar Thn", desc: "Matahari adalah bola plasma panas yang menghasilkan energi melalui fusi nuklir. Ia menampung 99% massa seluruh tata surya kita." },
            mercury: { name: "Merkurius", type: "Planet Terestrial", temp: "167°C", grav: "3.7 m/s²", mass: "0.055 Bumi", age: "4.5 Miliar Thn", desc: "Planet terkecil dan terdekat dengan Matahari. Sangat ekstrem: sangat panas di siang hari dan membeku di malam hari." },
            venus: { name: "Venus", type: "Planet Terestrial", temp: "464°C", grav: "8.87 m/s²", mass: "0.815 Bumi", age: "4.5 Miliar Thn", desc: "Planet terpanas di tata surya karena atmosfernya yang sangat tebal menjebak panas (efek rumah kaca)." },
            earth: { name: "Bumi", type: "Planet Habitable", temp: "15°C", grav: "9.8 m/s²", mass: "5.97×10²⁴ kg", age: "4.5 Miliar Thn", desc: "Satu-satunya tempat yang diketahui memiliki kehidupan. Memiliki pelindung atmosfer yang sempurna dan air cair." },
            mars: { name: "Mars", type: "Planet Terestrial", temp: "-65°C", grav: "3.71 m/s²", mass: "0.107 Bumi", age: "4.5 Miliar Thn", desc: "Planet Merah yang menyimpan bukti adanya air di masa lalu. Memiliki gunung berapi Olympus Mons yang sangat raksasa." },
            jupiter: { name: "Jupiter", type: "Gas Giant", temp: "-110°C", grav: "24.79 m/s²", mass: "318 Bumi", age: "4.5 Miliar Thn", desc: "Raja para planet. Begitu besar sehingga 1.300 Bumi bisa masuk ke dalamnya. Memiliki badai abadi 'Bintik Merah Besar'." },
            saturn: { name: "Saturnus", type: "Gas Giant", temp: "-140°C", grav: "10.44 m/s²", mass: "95 Bumi", age: "4.5 Miliar Thn", desc: "Dikenal karena sistem cincin esnya yang spektakuler. Planet ini sangat ringan, jika ada lautan cukup besar, ia akan mengapung." },
            uranus: { name: "Uranus", type: "Ice Giant", temp: "-195°C", grav: "8.69 m/s²", mass: "14.5 Bumi", age: "4.5 Miliar Thn", desc: "Planet yang sangat dingin dan unik karena ia berputar miring (menyamping) dibandingkan planet lainnya." },
            neptune: { name: "Neptunus", type: "Ice Giant", temp: "-201°C", grav: "11.15 m/s²", mass: "17.1 Bumi", age: "4.5 Miliar Thn", desc: "Planet biru yang sangat berangin. Angin di sini bisa mencapai kecepatan supersonik, lebih cepat dari jet tempur." },
            pluto: { name: "Pluto", type: "Planet Katai", temp: "-225°C", grav: "0.62 m/s²", mass: "0.002 Bumi", age: "4.5 Miliar Thn", desc: "Terletak di Sabuk Kuiper. Meski kecil dan jauh, ia memiliki atmosfer tipis dan lima bulan yang setia mengitarinya." }
        };

        const planets = [
            { id: 'mercury', dist: 140, size: 12, speed: 6, color: '#9ca3af' },
            { id: 'venus', dist: 190, size: 18, speed: 10, color: '#fbbf24' },
            { id: 'earth', dist: 250, size: 22, speed: 15, color: '#3b82f6' },
            { id: 'mars', dist: 310, size: 16, speed: 20, color: '#ef4444' },
            { id: 'jupiter', dist: 400, size: 40, speed: 35, color: '#d97706' },
            { id: 'saturn', dist: 510, size: 35, speed: 45, color: '#fcd34d' },
            { id: 'uranus', dist: 600, size: 26, speed: 55, color: '#7dd3fc' },
            { id: 'neptune', dist: 680, size: 26, speed: 65, color: '#1d4ed8' },
            { id: 'pluto', dist: 750, size: 10, speed: 80, color: '#94a3b8' }
        ];

        function init() {
            const space = document.getElementById('space');
            
            planets.forEach(p => {
                const orbit = document.createElement('div');
                orbit.className = 'orbit';
                orbit.style.width = p.dist + 'px';
                orbit.style.height = p.dist + 'px';
                orbit.style.animationDuration = p.speed + 's';
                
                const planet = document.createElement('div');
                planet.className = 'planet-clickable';
                planet.style.width = p.size + 'px';
                planet.style.height = p.size + 'px';
                planet.style.backgroundColor = p.color;
                
                // Event klik langsung pada elemen planet
                planet.onclick = (e) => {
                    e.stopPropagation(); // Mencegah konflik klik
                    loadPlanet(p.id);
                };
                
                orbit.appendChild(planet);
                space.appendChild(orbit);
            });

            // Taburan Bintang
            for(let i=0; i<150; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = Math.random() * 2 + 'px';
                star.style.height = star.style.width;
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                document.body.appendChild(star);
            }
        }

        function loadPlanet(id) {
            const data = db[id];
            const display = document.getElementById('display');
            
            // Efek transisi halus
            display.style.opacity = 0;
            display.style.transform = "translateX(-20px)";
            
            setTimeout(() => {
                display.innerHTML = `
                    <h1 class="planet-name">${data.name}</h1>
                    <p style="color: var(--neon-blue); font-weight: bold;">${data.type}</p>
                    <div class="data-grid">
                        <div class="data-card"><div class="label">Suhu</div><div class="value">${data.temp}</div></div>
                        <div class="data-card"><div class="label">Gravitasi</div><div class="value">${data.grav}</div></div>
                        <div class="data-card"><div class="label">Massa</div><div class="value">${data.mass}</div></div>
                        <div class="data-card"><div class="label">Usia</div><div class="value">${data.age}</div></div>
                    </div>
                    <h3 style="border-bottom: 1px solid var(--neon-blue); padding-bottom: 5px;">Data Analisis</h3>
                    <p style="line-height: 1.7; font-size: 0.95rem;">${data.desc}</p>
                `;
                display.style.opacity = 1;
                display.style.transform = "translateX(0)";
            }, 300);
        }

        init();
    </script>
</body>
</html>
